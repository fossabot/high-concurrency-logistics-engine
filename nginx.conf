worker_rlimit_nofile 65535;

events {
    worker_connections 40000;
}

http {
    tcp_nodelay on;
    postpone_output 0;
    # Use hash for speed; it's faster than least_conn for 16k users
    upstream axum_backend {
        least_conn;
        server axum-api-1:8080  max_fails=3 fail_timeout=30s;
        server axum-api-2:8080  max_fails=3 fail_timeout=30s;

        # Keep connections warm to Axum
        keepalive 4000;
        keepalive_requests 10000000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://axum_backend;

            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Critical for 100% ACKs
            proxy_buffering off;
            proxy_request_buffering off;
            tcp_nodelay on;

            # Timeouts
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_socket_keepalive on;

            # Optimized Buffers (Move these INSIDE location)
            proxy_buffer_size 4k;
            proxy_buffers 4 4k;
            proxy_busy_buffers_size 4k;

            # Identity
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
