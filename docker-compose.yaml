services:
  axum-api:
    build:
      context: .
      dockerfile: ./axum-api/Dockerfile
    networks:
      - redis-cluster-net
      - monitoring
    image: parcel-app-trial:latest
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_URL=redis://redis-cluster:6379
      - RUST_LOG=info
      - PORT=8080
      - HOST=0.0.0.0
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
    ulimits:
      nofile:
        soft: 30000
        hard: 30000
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
      postgres_db:
        condition: service_healthy

  postgres_db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    networks:
      - monitoring
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 1000
        hard: 1000

  k6-test:
    image: grafana/k6:latest
    profiles: ["test"]
    networks:
      - monitoring # This stops it from starting automatically
    volumes:
      - ./loadtests:/scripts
      - token-data:/loadtests:ro
    ulimits:
      nofile:
        soft: 30000
        hard: 30000
    command: run /scripts/complete_test.js
    depends_on:
      token-gen:
        condition: service_completed_successfully

  token-gen:
    build:
      context: .
      dockerfile: ./token-gen/Dockerfile # Dockerfile that runs your generate tokens
    environment:
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - TOKEN_OUTPUT=${TOKEN_OUTPUT}
      - TOKEN_COUNT=${TOKEN_COUNT}
    volumes:
      - token-data:/loadtests
    # Binary runs, writes token to /loadtests/token.txt, and exits
    command: ["./token-gen", "--output", "/loadtests/token.txt"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - axum-api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000" # moved to 3001 — 3000
    networks:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - monitoring
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  redis-node-1:
    image: redis:7-alpine
    ports:
      - "7001:6379"
      - "17001:16379" # cluster bus port (always node port + 10000)
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-1
      --cluster-announce-hostname redis-node-1
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
      --appendonly yes
      --maxclients 20000
    volumes:
      - redis-node-1-data:/data
    networks:
      - redis-cluster-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-node-2:
    image: redis:7-alpine
    ports:
      - "7002:6379"
      - "17002:16379"
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-2
      --cluster-announce-hostname redis-node-2
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
      --appendonly yes
      --maxclients 20000
    volumes:
      - redis-node-2-data:/data
    networks:
      - redis-cluster-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-node-3:
    image: redis:7-alpine
    ports:
      - "7003:6379"
      - "17003:16379"
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-3
      --cluster-announce-hostname redis-node-3
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
      --appendonly yes
      --maxclients 20000
    volumes:
      - redis-node-3-data:/data
    networks:
      - redis-cluster-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-node-4:
    image: redis:7-alpine
    ports:
      - "7004:6379"
      - "17004:16379"
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-4
      --cluster-announce-hostname redis-node-4
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
      --appendonly yes
      --maxclients 20000
    volumes:
      - redis-node-4-data:/data
    networks:
      - redis-cluster-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-node-5:
    image: redis:7-alpine
    ports:
      - "7005:6379"
      - "17005:16379"
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-5
      --cluster-announce-hostname redis-node-5
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
      --appendonly yes
      --maxclients 20000
    volumes:
      - redis-node-5-data:/data
    networks:
      - redis-cluster-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-node-6:
    image: redis:7-alpine
    ports:
      - "7006:6379"
      - "17006:16379"
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-6
      --cluster-announce-hostname redis-node-6
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
      --appendonly yes
      --maxclients 20000
    volumes:
      - redis-node-6-data:/data
    networks:
      - redis-cluster-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cluster-init:
    image: redis:7-alpine
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo 'Waiting for all nodes to be ready...' &&
        sleep 10 &&
        redis-cli --cluster create \
        redis-node-1:6379 \
        redis-node-2:6379 \
        redis-node-3:6379 \
        redis-node-4:6379 \
        redis-node-5:6379 \
        redis-node-6:6379 \
        --cluster-replicas 1 \
        --cluster-yes &&
        echo 'Cluster created successfully'
    networks:
      - redis-cluster-net
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
      redis-node-6:
        condition: service_healthy
volumes:
  postgres-data:
  token-data:
  prometheus-data:
  grafana-data:
  redis-node-1-data:
  redis-node-2-data:
  redis-node-3-data:
  redis-node-4-data:
  redis-node-5-data:
  redis-node-6-data:

networks:
  redis-cluster-net:
    driver: bridge
  monitoring:
    driver: bridge
