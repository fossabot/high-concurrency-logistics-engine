apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-watcher-sa
  namespace: parcel-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-read-role
  namespace: parcel-app
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-read-binding
  namespace: parcel-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-read-role
subjects:
  - kind: ServiceAccount
    name: job-watcher-sa
    namespace: parcel-app
