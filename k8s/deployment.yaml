apiVersion: v1
kind: Namespace
metadata:
  name: parcel-app

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: parcel-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: POSTGRES_DB
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: axum-api
  namespace: parcel-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: axum-api
  template:
    metadata:
      labels:
        app: axum-api
    spec:
      containers:
        - name: axum-api
          image: asia-south1-docker.pkg.dev/project-ec21338a-215e-427c-995/my-repo/parcel-app-trial:v17
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: POSTGRES_HOST
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: POSTGRES_DB
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: JWT_PRIVATE_KEY
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: JWT_PUBLIC_KEY
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: SMTP_PASSWORD
            - name: REDIS_NODE
              value: "redis-cluster-0.redis-cluster.parcel-app.svc.cluster.local"
            - name: RUST_LOG
              value: "info"
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: "2000Mi"
              cpu: "1000m"
            limits:
              memory: "2000Mi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

---
# REDIS CLUSTER — 6 nodes (3 masters + 3 replicas)

apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-cluster-config
  namespace: parcel-app
data:
  redis.conf: |
    port 6379
    cluster-enabled yes
    cluster-config-file nodes.conf
    cluster-node-timeout 5000
    appendonly yes
    maxclients 20000

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: parcel-app
spec:
  serviceName: redis-cluster
  replicas: 6
  selector:
    matchLabels:
      app: redis-cluster
  template:
    metadata:
      labels:
        app: redis-cluster
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: client
            - containerPort: 16379
              name: gossip
          command:
            - redis-server
            - /conf/redis.conf
            - --cluster-announce-hostname
            - $(POD_NAME).redis-cluster.parcel-app.svc.cluster.local
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: conf
              mountPath: /conf
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "500Mi"
              cpu: "500m"
            limits:
              memory: "500Mi"
              cpu: "500m"
      volumes:
        - name: conf
          configMap:
            name: redis-cluster-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

---
# Redis cluster init Job — runs once to create the cluster
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-cluster-init
  namespace: parcel-app
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: redis-cluster-init
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              sleep 60 &&
              redis-cli --cluster create \
              redis-cluster-0.redis-cluster.parcel-app.svc.cluster.local:6379 \
              redis-cluster-1.redis-cluster.parcel-app.svc.cluster.local:6379 \
              redis-cluster-2.redis-cluster.parcel-app.svc.cluster.local:6379 \
              redis-cluster-3.redis-cluster.parcel-app.svc.cluster.local:6379 \
              redis-cluster-4.redis-cluster.parcel-app.svc.cluster.local:6379 \
              redis-cluster-5.redis-cluster.parcel-app.svc.cluster.local:6379 \
              --cluster-replicas 1 \
              --cluster-yes

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: parcel-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            requests:
              memory: "500Mi"
              cpu: "500m"
            limits:
              memory: "500Mi"
              cpu: "500m"
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}

---
# PROMETHEUS

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: parcel-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: "axum-api"
        scrape_interval: 15s
        scrape_timeout: 14s
        static_configs:
          - targets:
              - "axum-api-service:8080"
        metrics_path: "/metrics"

      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: parcel-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "800Mi"
              cpu: "1000m"
            limits:
              memory: "800Mi"
              cpu: "1000m"
      volumes:
        - name: grafana-data
          emptyDir: {}

---
# HORIZONTAL POD AUTOSCALER — auto scale axum-api

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: axum-api-hpa
  namespace: parcel-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: axum-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
